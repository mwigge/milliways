[project]
name = "mempalace-milliways"
version = "0.1.0"
description = "MemPalace conversation primitives for milliways"
requires-python = ">=3.10"
dependencies = [
    "mempalace>=3.3.1",
    "chromadb>=0.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

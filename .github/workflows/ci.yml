name: ci
on: [push, pull_request]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  go-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - run: go build ./...
      - run: go test ./... -count=1 -race
      - run: go vet ./...

  rust-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with: { toolchain: stable }
      - name: install linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl-dev libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev libssl-dev pkg-config libfontconfig-dev libwayland-dev
      - run: cargo check --manifest-path crates/milliways-term/Cargo.toml -p milliways
      - run: cargo test --manifest-path crates/milliways-term/Cargo.toml -p milliways --lib

  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - run: go install github.com/atombender/go-jsonschema@latest
      - run: scripts/gen-rpc-types.sh
      - run: git diff --exit-code internal/rpc/types.go

  smoke:
    runs-on: ubuntu-latest
    needs: go-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - run: go build -o /tmp/milliways ./cmd/milliways
      - run: MILLIWAYS_BIN=/tmp/milliways bash scripts/smoke.sh

  integration-smoke-linux:
    runs-on: ubuntu-latest
    needs: go-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - run: go build -o /tmp/milliways ./cmd/milliways
      - run: go build -o /tmp/milliwaysd ./cmd/milliwaysd
      - run: go build -o /tmp/milliwaysctl ./cmd/milliwaysctl
      - run: |
          mkdir -p /tmp/state
          /tmp/milliwaysd --state-dir /tmp/state &
          for i in 1 2 3 4 5; do [ -S /tmp/state/sock ] && break; sleep 1; done
          /tmp/milliwaysctl ping --socket /tmp/state/sock
          /tmp/milliwaysctl agents --socket /tmp/state/sock
          /tmp/milliwaysctl status --socket /tmp/state/sock
          kill %1

  # Build native packages and verify each installs cleanly on its target distro.
  package-smoke-linux:
    runs-on: ubuntu-latest
    needs: go-build
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Build packages
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo ci) \
          OUT_DIR=$GITHUB_WORKSPACE/dist \
            bash scripts/build-linux-amd64.sh

      - name: Test .deb on Ubuntu
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$GITHUB_WORKSPACE/dist:/dist:ro" \
            ubuntu:24.04 \
            bash -c '
              set -e
              dpkg -i /dist/milliways_*.deb
              milliways --version
              milliwaysctl --help >/dev/null
              test -f /usr/share/milliways/scripts/install_local.sh
              echo "PASS deb"
            '

      - name: Test .rpm on Fedora
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$GITHUB_WORKSPACE/dist:/dist:ro" \
            fedora:41 \
            bash -c '
              set -e
              rpm -i /dist/milliways-*.rpm
              milliways --version
              milliwaysctl --help >/dev/null
              test -f /usr/share/milliways/scripts/install_local.sh
              echo "PASS rpm"
            '

      - name: Test .pkg.tar.zst on Arch
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$GITHUB_WORKSPACE/dist:/dist:ro" \
            archlinux:latest \
            bash -c '
              set -e
              pacman -U --noconfirm /dist/milliways-*.pkg.tar.zst
              milliways --version
              milliwaysctl --help >/dev/null
              test -f /usr/share/milliways/scripts/install_local.sh
              echo "PASS pacman"
            '

  # Full install-smoke on a native linux/amd64 host. This is the certification
  # run: binary downloads from a local file:// release dir, source fallback
  # (no emulation — Docker host IS amd64), and the deep CLI + session-switch
  # smoke. Requires docker-in-docker (available on ubuntu-latest runners).
  install-smoke-linux:
    runs-on: ubuntu-latest
    needs: go-build
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }

      # Build native linux/amd64 binaries directly — no cross-compilation
      # needed because the runner IS amd64. CGO_ENABLED=1 for SQLite.
      - name: Build linux/amd64 binaries
        run: |
          mkdir -p dist
          for bin in milliways milliwaysd milliwaysctl; do
            CGO_ENABLED=1 go build \
              -ldflags "-X main.version=$(git describe --tags --always --dirty 2>/dev/null || echo ci)" \
              -o "dist/${bin}_linux_amd64" \
              "./cmd/${bin}"
          done

      - name: Run install smoke (Ubuntu · Fedora · source-fallback · deep CLI)
        run: |
          export DIST_DIR="$GITHUB_WORKSPACE/dist"
          bash scripts/smoke-linux-install.sh

      - name: Build binaries for feature smoke
        run: |
          mkdir -p /tmp/smoke-bin
          go build -o /tmp/smoke-bin/milliways    ./cmd/milliways
          go build -o /tmp/smoke-bin/milliwaysd   ./cmd/milliwaysd
          go build -o /tmp/smoke-bin/milliwaysctl ./cmd/milliwaysctl

      - name: Run feature smoke
        run: |
          pip3 install mempalace python-pptx
          MILLIWAYS_BIN=/tmp/smoke-bin bash scripts/smoke-features.sh

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # ── Linux desktop terminal binaries (optional) ───────────────────────
      - name: Download Linux terminal binaries
        id: wezterm_linux
        continue-on-error: true
        env:
          WEZTERM_RELEASE: milliways-wezterm
          WEZTERM_REPO: mwigge/wezterm-milliways
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/wezterm-linux-bin
          for pattern in \
            milliways-term_linux_amd64 \
            wezterm-gui_linux_amd64 \
            wezterm-mux-server_linux_amd64
          do
            gh release download "$WEZTERM_RELEASE" \
              --repo "$WEZTERM_REPO" \
              --pattern "$pattern" \
              --dir /tmp/wezterm-linux-bin \
              --clobber || true
          done

          if [ -f /tmp/wezterm-linux-bin/milliways-term_linux_amd64 ]; then
            mv /tmp/wezterm-linux-bin/milliways-term_linux_amd64 /tmp/wezterm-linux-bin/milliways-term
          elif [ -f /tmp/wezterm-linux-bin/wezterm-gui_linux_amd64 ]; then
            mv /tmp/wezterm-linux-bin/wezterm-gui_linux_amd64 /tmp/wezterm-linux-bin/wezterm-gui
          fi
          if [ -f /tmp/wezterm-linux-bin/wezterm-mux-server_linux_amd64 ]; then
            mv /tmp/wezterm-linux-bin/wezterm-mux-server_linux_amd64 /tmp/wezterm-linux-bin/wezterm-mux-server
          fi

          chmod +x /tmp/wezterm-linux-bin/milliways-term /tmp/wezterm-linux-bin/wezterm-gui /tmp/wezterm-linux-bin/wezterm-mux-server 2>/dev/null || true
          test \( -x /tmp/wezterm-linux-bin/milliways-term -o -x /tmp/wezterm-linux-bin/wezterm-gui \) \
            -a -x /tmp/wezterm-linux-bin/wezterm-mux-server

      # ── Linux amd64 binaries + native packages (.deb / .rpm / .pkg.tar.zst)
      # Uses the Debian bookworm build image with fpm installed.
      # CGO_ENABLED=1 is required for SQLite (mattn/go-sqlite3).
      - name: Build linux/amd64 binaries and packages
        run: |
          VERSION=${{ github.ref_name }} \
          MILLIWAYS_TERM_SRC=/tmp/wezterm-linux-bin \
          OUT_DIR=$GITHUB_WORKSPACE/dist \
            bash scripts/build-linux-amd64.sh

      # ── Package agent toolkit bundle (if sibling repo is present) ────────
      - name: Package agent toolkit bundle
        continue-on-error: true
        run: |
          if [ -d "../agent-toolkit-bundle" ] && [ -f "../agent-toolkit-bundle/skill-rules.json" ]; then
            tar -czf dist/milliways-agent-toolkit.tar.gz -C ../agent-toolkit-bundle .
            echo "Packaged agent toolkit bundle"
          else
            echo "agent-toolkit-bundle sibling not found — skipping toolkit asset"
          fi

      # ── Upload linux/amd64 assets to the release ──────────────────────────
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Raw linux/amd64 binaries
          ASSETS=(
            dist/milliways_linux_amd64
            dist/milliwaysd_linux_amd64
            dist/milliwaysctl_linux_amd64
          )

          # Native Linux packages — glob so version suffix doesn't need hardcoding
          for pkg in dist/milliways_*.deb dist/milliways-*.rpm dist/milliways-*.pkg.tar.zst; do
            [ -f "$pkg" ] && ASSETS+=("$pkg")
          done

          # Agent toolkit bundle
          [ -f dist/milliways-agent-toolkit.tar.gz ] && ASSETS+=(dist/milliways-agent-toolkit.tar.gz)

          # Standalone llama-server for linux/amd64 (bundled in packages; also released separately)
          [ -f dist/llama-server_linux_amd64 ] && ASSETS+=(dist/llama-server_linux_amd64)

          # Linux desktop app assets (present when patched terminal binaries were available)
          [ -f dist/MilliWays-linux-amd64.tar.gz ] && ASSETS+=(dist/MilliWays-linux-amd64.tar.gz)
          [ -f dist/milliways-term_linux_amd64 ] && ASSETS+=(dist/milliways-term_linux_amd64)
          [ -f dist/wezterm-mux-server_linux_amd64 ] && ASSETS+=(dist/wezterm-mux-server_linux_amd64)

          if gh release view "$TAG" --json tagName &>/dev/null; then
            echo "Release $TAG already exists — uploading assets only"
            gh release upload "$TAG" --clobber "${ASSETS[@]}"
          else
            gh release create "$TAG" \
              --title "milliways $TAG" \
              --generate-notes \
              "${ASSETS[@]}"
          fi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # ── macOS binaries (darwin/arm64 + darwin/amd64) ─────────────────────
      # CGO_ENABLED=1 is required for SQLite (mattn/go-sqlite3).
      - name: Build macOS binaries
        run: |
          mkdir -p dist
          for GOARCH in arm64 amd64; do
            for bin in milliways milliwaysd milliwaysctl; do
              CGO_ENABLED=1 GOOS=darwin GOARCH=$GOARCH go build \
                -ldflags "-X main.version=${{ github.ref_name }}" \
                -o "dist/${bin}_darwin_${GOARCH}" \
                "./cmd/${bin}"
            done
          done

      # ── macOS app bundle (optional — needs wezterm-milliways fork) ────────
      - name: Download wezterm binaries
        id: wezterm
        continue-on-error: true
        env:
          WEZTERM_RELEASE: milliways-wezterm
          WEZTERM_REPO: mwigge/wezterm-milliways
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/wezterm-bin
          gh release download "$WEZTERM_RELEASE" \
            --repo "$WEZTERM_REPO" \
            --pattern "wezterm-gui" \
            --pattern "wezterm-mux-server" \
            --dir /tmp/wezterm-bin \
            --clobber
          chmod +x /tmp/wezterm-bin/wezterm-gui /tmp/wezterm-bin/wezterm-mux-server

      - name: Build and bundle macOS app
        if: steps.wezterm.outcome == 'success'
        run: make bundle-macos WEZTERM_SRC=/tmp/wezterm-bin
        env:
          PREFIX: /tmp/milliways-install

      # ── Upload macOS assets to the release ────────────────────────────────
      - name: Upload macOS release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Raw darwin binaries
          ASSETS=(
            dist/milliways_darwin_arm64
            dist/milliways_darwin_amd64
            dist/milliwaysd_darwin_arm64
            dist/milliwaysd_darwin_amd64
            dist/milliwaysctl_darwin_arm64
            dist/milliwaysctl_darwin_amd64
          )

          if [ -f "dist/MilliWays.app.zip" ]; then
            ASSETS+=(dist/MilliWays.app.zip)
          fi

          if gh release view "$TAG" --json tagName &>/dev/null; then
            echo "Release $TAG already exists — uploading assets only"
            gh release upload "$TAG" --clobber "${ASSETS[@]}"
          else
            gh release create "$TAG" \
              --title "milliways $TAG" \
              --generate-notes \
              "${ASSETS[@]}"
          fi

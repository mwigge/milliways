name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # The wezterm-gui binary is not built in CI — it's pre-built and stored
      # as a release asset in the wezterm-milliways repo under the tag
      # `milliways-wezterm`. If the download fails (repo missing / no asset)
      # the macOS app bundle is skipped; Go binaries still ship.
      - name: Download wezterm binaries
        id: wezterm
        continue-on-error: true
        env:
          WEZTERM_RELEASE: milliways-wezterm
          WEZTERM_REPO: mwigge/wezterm-milliways
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/wezterm-bin
          gh release download "$WEZTERM_RELEASE" \
            --repo "$WEZTERM_REPO" \
            --pattern "wezterm-gui" \
            --pattern "wezterm-mux-server" \
            --dir /tmp/wezterm-bin \
            --clobber
          chmod +x /tmp/wezterm-bin/wezterm-gui /tmp/wezterm-bin/wezterm-mux-server

      - name: Build and bundle macOS app
        if: steps.wezterm.outcome == 'success'
        run: make bundle-macos WEZTERM_SRC=/tmp/wezterm-bin
        env:
          PREFIX: /tmp/milliways-install

      - name: Build all binaries (all platforms)
        run: |
          mkdir -p dist
          for GOOS in darwin linux; do
            for GOARCH in arm64 amd64; do
              suffix="${GOOS}_${GOARCH}"
              GOOS=$GOOS GOARCH=$GOARCH go build \
                -ldflags "-X main.version=${{ github.ref_name }}" \
                -o "dist/milliways_${suffix}" ./cmd/milliways
              GOOS=$GOOS GOARCH=$GOARCH go build \
                -ldflags "-X main.version=${{ github.ref_name }}" \
                -o "dist/milliwaysd_${suffix}" ./cmd/milliwaysd
              GOOS=$GOOS GOARCH=$GOARCH go build \
                -ldflags "-X main.version=${{ github.ref_name }}" \
                -o "dist/milliwaysctl_${suffix}" ./cmd/milliwaysctl
            done
          done

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          ASSETS=(
            dist/milliways_darwin_arm64
            dist/milliways_darwin_amd64
            dist/milliways_linux_amd64
            dist/milliways_linux_arm64
            dist/milliwaysd_darwin_arm64
            dist/milliwaysd_darwin_amd64
            dist/milliwaysd_linux_amd64
            dist/milliwaysd_linux_arm64
            dist/milliwaysctl_darwin_arm64
            dist/milliwaysctl_darwin_amd64
            dist/milliwaysctl_linux_amd64
            dist/milliwaysctl_linux_arm64
          )
          if [ -f "dist/MilliWays.app.zip" ]; then
            ASSETS+=(dist/MilliWays.app.zip)
          fi

          # Create the release if it does not already exist (e.g. when the
          # tag was pushed without a manual gh release create first).
          # If it does exist (created manually before CI ran), skip creation
          # so we don't clobber the release notes — just upload the assets.
          if gh release view "$TAG" --json tagName &>/dev/null; then
            echo "Release $TAG already exists — uploading assets only"
            gh release upload "$TAG" --clobber "${ASSETS[@]}"
          else
            gh release create "$TAG" \
              --title "milliways $TAG" \
              --generate-notes \
              "${ASSETS[@]}"
          fi

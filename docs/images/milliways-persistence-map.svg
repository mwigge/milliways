<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520">
  <rect width="1120" height="520" fill="#111827"/>
  <style>
    .title { font: 700 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f9fafb; }
    .label { font: 600 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e5e7eb; }
    .text { font: 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; }
    .mono { font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; fill: #d1d5db; }
    .muted { fill: #94a3b8; }
    .ok { fill: #34d399; }
    .warn { fill: #fbbf24; }
    .accent { fill: #8b5cf6; }
    .cyan { fill: #38bdf8; }
    .pearl { fill: #f5f5f4; }
    .box { fill: #1f2937; stroke: #475569; stroke-width: 1.4; rx: 10; }
    .box2 { fill: #172033; stroke: #64748b; stroke-width: 1.4; rx: 10; }
    .store { fill: #0f172a; stroke: #38bdf8; stroke-width: 1.4; rx: 10; }
    .line { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .line2 { stroke: #8b5cf6; stroke-width: 2; fill: none; marker-end: url(#arrow2); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#8b5cf6"/>
    </marker>
  </defs>
<text x="40" y="52" class="title">Persistence map</text>
<rect x="40" y="90" width="250" height="130" class="box2"/>
<text x="58" y="118" class="label">Live process</text>
<text x="58" y="144" class="text">current REPL turn log</text>
<text x="58" y="166" class="text">stream state</text>
<text x="58" y="188" class="text">switch briefing</text>
<rect x="350" y="70" width="300" height="120" class="store"/>
<text x="368" y="98" class="label">Config</text>
<text x="368" y="124" class="text">~/.config/milliways/local.env</text>
<text x="368" y="146" class="text">login, model, path, endpoint</text>
<rect x="730" y="70" width="310" height="120" class="store"/>
<text x="748" y="98" class="label">Metrics</text>
<text x="748" y="124" class="text">~/.local/state/milliways/metrics.db</text>
<text x="748" y="146" class="text">tokens, cost, latency, errors</text>
<rect x="350" y="235" width="300" height="120" class="store"/>
<text x="368" y="263" class="label">Event history</text>
<text x="368" y="289" class="text">~/.local/state/milliways/history</text>
<text x="368" y="311" class="text">one ndjson file per runner</text>
<rect x="730" y="235" width="310" height="120" class="store"/>
<text x="748" y="263" class="label">Project memory</text>
<text x="748" y="289" class="text">~/.mempalace</text>
<text x="748" y="311" class="text">facts, drawers, handoff records</text>
<rect x="350" y="400" width="300" height="80" class="store"/>
<text x="368" y="428" class="label">Code index</text>
<text x="368" y="454" class="text">.codegraph workspace</text>
<text x="368" y="476" class="text">symbol and dependency context</text>
<path d="M290,150 C320,150 320,130 350,130" class="line"/>
<path d="M290,150 C320,150 320,295 350,295" class="line"/>
<path d="M290,150 C510,150 510,130 730,130" class="line"/>
<path d="M290,150 C510,150 510,295 730,295" class="line"/>
<path d="M500,355 C500,355 500,400 500,400" class="line"/>
<text x="58" y="254" class="text muted">Boundary: live turn log is not full automatic restore yet.</text>
<text x="58" y="280" class="text muted">Persisted stores survive process restart and power loss.</text>
</svg>

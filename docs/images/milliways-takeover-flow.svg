<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500">
  <rect width="1120" height="500" fill="#111827"/>
  <style>
    .title { font: 700 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f9fafb; }
    .label { font: 600 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e5e7eb; }
    .text { font: 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; }
    .mono { font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; fill: #d1d5db; }
    .muted { fill: #94a3b8; }
    .ok { fill: #34d399; }
    .warn { fill: #fbbf24; }
    .accent { fill: #8b5cf6; }
    .cyan { fill: #38bdf8; }
    .pearl { fill: #f5f5f4; }
    .box { fill: #1f2937; stroke: #475569; stroke-width: 1.4; rx: 10; }
    .box2 { fill: #172033; stroke: #64748b; stroke-width: 1.4; rx: 10; }
    .store { fill: #0f172a; stroke: #38bdf8; stroke-width: 1.4; rx: 10; }
    .line { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .line2 { stroke: #8b5cf6; stroke-width: 2; fill: none; marker-end: url(#arrow2); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#8b5cf6"/>
    </marker>
  </defs>
<text x="40" y="52" class="title">Takeover and handoff flow</text>
<rect x="40" y="110" width="210" height="120" class="box"/>
<text x="58" y="138" class="label">Active runner</text>
<text x="58" y="164" class="text">current task</text>
<text x="58" y="186" class="text">recent turns</text>
<text x="58" y="208" class="text">last tool state</text>
<rect x="310" y="95" width="230" height="150" class="box"/>
<text x="328" y="123" class="label">Briefing builder</text>
<text x="328" y="149" class="text">summarise intent</text>
<text x="328" y="171" class="text">capture decisions</text>
<text x="328" y="193" class="text">carry next step</text>
<rect x="610" y="70" width="220" height="120" class="box2"/>
<text x="628" y="98" class="label">Same REPL switch</text>
<text x="628" y="124" class="text">inject briefing</text>
<text x="628" y="146" class="text">continue immediately</text>
<rect x="610" y="245" width="220" height="120" class="store"/>
<text x="628" y="273" class="label">Cross-pane handoff</text>
<text x="628" y="299" class="text">write handoff fact</text>
<text x="628" y="321" class="text">target reads on open</text>
<rect x="890" y="150" width="190" height="120" class="box"/>
<text x="908" y="178" class="label">Target runner</text>
<text x="908" y="204" class="text">project memory</text>
<text x="908" y="226" class="text">briefing</text>
<text x="908" y="248" class="text">new prompt</text>
<path d="M250,170 C280,170 280,170 310,170" class="line"/>
<path d="M540,145 C575,145 575,130 610,130" class="line2"/>
<path d="M540,195 C575,195 575,305 610,305" class="line"/>
<path d="M830,130 C860,130 860,190 890,190" class="line2"/>
<path d="M830,305 C860,305 860,210 890,210" class="line"/>
<text x="314" y="286" class="text muted">If MemPalace is unavailable, cross-pane takeover degrades to local context only.</text>
</svg>

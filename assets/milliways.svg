<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111811"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Outer phosphor border ring -->
  <rect x="18" y="18" width="476" height="476" rx="96" ry="96"
        fill="none" stroke="#4db51f" stroke-width="1.5" opacity="0.25"/>

  <!-- AI — top half -->
  <text x="256" y="222"
        font-family="JetBrains Mono, Courier New, monospace"
        font-size="128" font-weight="700" letter-spacing="-6"
        text-anchor="middle" fill="#4db51f" opacity="0.75"
        filter="url(#glow)">AI</text>

  <!-- MW — bottom half, dominant -->
  <text x="256" y="390"
        font-family="JetBrains Mono, Courier New, monospace"
        font-size="188" font-weight="700" letter-spacing="-12"
        text-anchor="middle" fill="#4db51f"
        filter="url(#softglow)">MW</text>
</svg>
